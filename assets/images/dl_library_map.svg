<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#183860"/>
    </linearGradient>
    <style>
      .title { font: 700 30px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #f6fbff; }
      .head { font: 700 18px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #eaf4ff; }
      .note { font: 500 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #9fb8d8; }
    </style>
  </defs>
  <rect width="1200" height="500" rx="30" fill="url(#bg6)"/>
  <text x="58" y="64" class="title">任务三：把零散代码整理成一套能复用的小型深度学习库</text>

  <rect x="490" y="170" width="220" height="130" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(86,198,255,0.25)"/>
  <text x="560" y="222" class="head">Model / Layer</text>
  <text x="540" y="252" class="note">前向传播与参数</text>

  <rect x="120" y="84" width="190" height="100" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(86,198,255,0.22)"/>
  <text x="174" y="132" class="head">Activation</text>
  <text x="154" y="160" class="note">ReLU / SiLU / GELU</text>

  <rect x="120" y="316" width="190" height="100" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(86,198,255,0.22)"/>
  <text x="186" y="364" class="head">Loss</text>
  <text x="154" y="392" class="note">MSE / BCE / CE</text>

  <rect x="880" y="84" width="190" height="100" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(86,198,255,0.22)"/>
  <text x="930" y="132" class="head">Optimizer</text>
  <text x="914" y="160" class="note">SGD / Adam / AdamW</text>

  <rect x="880" y="316" width="190" height="100" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(86,198,255,0.22)"/>
  <text x="922" y="364" class="head">Regularization</text>
  <text x="928" y="392" class="note">Dropout / Weight Decay</text>

  <rect x="490" y="344" width="220" height="100" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(86,198,255,0.22)"/>
  <text x="520" y="392" class="head">Normalization / Init</text>
  <text x="546" y="420" class="note">BN / LN / Xavier / He</text>

  <g stroke="rgba(255,209,102,0.6)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M310 134 C390 134, 430 170, 490 220"/>
    <path d="M310 366 C390 366, 430 300, 490 250"/>
    <path d="M710 220 C770 170, 810 134, 880 134"/>
    <path d="M710 250 C770 300, 810 366, 880 366"/>
    <path d="M600 300 C600 320, 600 330, 600 344"/>
  </g>

  <text x="92" y="462" class="note">做到这一步，你写的就不再是一次性的任务代码，而是一套以后还能拿去继续搭 MLP、ResNet、Transformer 的基础积木。</text>
</svg>
