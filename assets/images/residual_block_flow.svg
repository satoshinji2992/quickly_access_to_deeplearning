<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111e"/>
      <stop offset="100%" stop-color="#152d52"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#56c6ff"/>
      <stop offset="100%" stop-color="#3dd9c5"/>
    </linearGradient>
    <style>
      .title { font: 700 30px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #f8fbff; }
      .box { fill: rgba(255,255,255,0.05); stroke: rgba(86,198,255,0.25); }
      .text { font: 700 18px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #e9f4ff; }
      .note { font: 500 16px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #9fb6d8; }
      .sum { font: 700 22px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #07111f; }
    </style>
  </defs>
  <rect width="1200" height="460" rx="30" fill="url(#bg2)"/>
  <text x="60" y="62" class="title">一个最基础的残差块：普通卷积块 + 一条捷径连接</text>

  <rect x="74" y="184" width="110" height="82" rx="20" class="box"/>
  <text x="118" y="232" text-anchor="middle" class="text">输入 x</text>

  <rect x="264" y="174" width="136" height="102" rx="24" class="box"/>
  <text x="332" y="222" text-anchor="middle" class="text">3×3 Conv</text>
  <text x="332" y="248" text-anchor="middle" class="note">BN + ReLU</text>

  <rect x="484" y="174" width="136" height="102" rx="24" class="box"/>
  <text x="552" y="222" text-anchor="middle" class="text">3×3 Conv</text>
  <text x="552" y="248" text-anchor="middle" class="note">BN</text>

  <circle cx="760" cy="225" r="34" fill="#ffd166"/>
  <text x="760" y="233" text-anchor="middle" class="sum">+</text>

  <rect x="870" y="184" width="122" height="82" rx="20" class="box"/>
  <text x="931" y="233" text-anchor="middle" class="text">ReLU</text>

  <rect x="1056" y="184" width="110" height="82" rx="20" class="box"/>
  <text x="1110" y="232" text-anchor="middle" class="text">输出 y</text>

  <g stroke="url(#cyan)" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M184 225 C214 225, 232 225, 264 225"/>
    <path d="M400 225 C432 225, 452 225, 484 225"/>
    <path d="M620 225 C660 225, 700 225, 726 225"/>
    <path d="M794 225 C826 225, 844 225, 870 225"/>
    <path d="M992 225 C1018 225, 1034 225, 1056 225"/>
  </g>
  <g fill="#56c6ff">
    <polygon points="264,225 248,215 248,235"/>
    <polygon points="484,225 468,215 468,235"/>
    <polygon points="726,225 710,215 710,235"/>
    <polygon points="870,225 854,215 854,235"/>
    <polygon points="1056,225 1040,215 1040,235"/>
  </g>

  <path d="M129 183 C129 110, 715 110, 726 191" stroke="#ff9f43" stroke-width="7" fill="none" stroke-linecap="round"/>
  <polygon points="726,191 710,182 720,205" fill="#ff9f43"/>
  <text x="340" y="108" class="note">shortcut / identity path：输入尽量原样保留下来</text>

  <rect x="78" y="330" width="1040" height="78" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,209,102,0.18)"/>
  <text x="104" y="378" class="note">如果输入输出形状一致，就直接把 x 加回来；如果通道数或尺寸变了，就先用 1×1 卷积把 shortcut 调整到可相加的形状。</text>
</svg>
